<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos | ModaShop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <div class="logo">MODA<span>SHOP</span></div>

    <div class="menu-toggle" onclick="toggleMenu()">
      <i class="fas fa-bars"></i>
    </div>

    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="productos.html" class="active">Productos</a></li>
      <li><a href="#">Contacto</a></li>
    </ul>

    <div class="cart-icon" onclick="toggleCart()">
      <i class="fas fa-shopping-bag"></i>
      <span id="cart-count">0</span>
    </div>
  </nav>
</header>

<!-- CART PANEL -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2>Tu Carrito</h2>
    <button class="close-cart" onclick="closeCart()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div id="checkout-modal-overlay" class="product-modal-overlay">
    <div class="product-modal">
      <button class="product-modal-close" onclick="document.getElementById('checkout-modal-overlay').classList.remove('active')">&times;</button>
      <div class="product-modal-body">
        <h3>Datos de envío</h3>
        <div style="margin-top:20px;">
          <input id="checkout-name" type="text" placeholder="Nombre">
          <input id="checkout-lastname" type="text" placeholder="Apellido">
          <input id="checkout-city" type="text" placeholder="Ciudad">
          <input id="checkout-address" type="text" placeholder="Dirección">
          <select id="checkout-housing-type">
            <option value="">Tipo de vivienda</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
          </select>
          <input id="checkout-apartment-number" type="text" placeholder="Número de apartamento" style="display:none;">
        </div>
        <button id="checkout-confirm" class="add-cart">Confirmar compra</button>
      </div>
    </div>
  </div>

  <div id="product-modal-overlay" class="product-modal-overlay">
    <div class="product-modal">
      <button class="product-modal-close" onclick="closeProductModal()">&times;</button>
      <img id="modal-product-image" src="" alt="">
      <div class="product-modal-body">
        <h3 id="modal-product-name"></h3>
        <p id="modal-product-price" class="price"></p>
        <button id="modal-add-cart" class="add-cart">Agregar al carrito</button>
      </div>
    </div>
  </div>

  <div id="cart-items"></div>

  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amount">$<span id="cart-total">0</span></span>
    </div>
    <button class="checkout">Comprar ahora</button>
  </div>
</div>

<!-- PRODUCTS PAGE -->
<section class="products products-page">
  <div class="section-label"><span>Catálogo</span></div>
  <h1>Todos los<br>Productos</h1>
  <p class="products-page-subtitle">Explora nuestra colección completa de moda urbana</p>

  <div class="search-wrap">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="search" placeholder="Buscar prendas...">
  </div>

  <div class="product-grid" id="product-list"></div>
</section>

<footer>
  <p>© 2026 <strong>ModaShop</strong> — Todos los derechos reservados</p>
</footer>

<script src="data.js"></script>
<script src="productos.js"></script>
<script src="script.js"></script>

</body>
</html>
